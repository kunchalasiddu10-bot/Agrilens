<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriLens | AI Crop Disease Detector</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Progressive Web App Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#10b981">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=4.0">
</head>

<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">
                <i class="fa-solid fa-leaf logo-icon"></i>
                <span>AgriLens <span class="badge">AI Engine</span></span>
            </div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="/" class="{{ 'active' if request.endpoint == 'index' else '' }}">Scanner</a></li>
                    <li><a href="/about" class="{{ 'active' if request.endpoint == 'about' else '' }}">About</a></li>
                </ul>

                <select id="lang-selector" class="lang-dropdown">
                    <option value="English">English</option>
                    <option value="Telugu">తెలుగు (Telugu)</option>
                    <option value="Hindi">हिंदी (Hindi)</option>
                    <option value="Tamil">தமிழ் (Tamil)</option>
                    <option value="Marathi">मराठी (Marathi)</option>
                </select>
            </div>
        </nav>

        {% block content %}{% endblock %}

    </div>

    <!-- Ultra-Premium Glass Background Elements -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}?v=3.0"></script>
</body>

</html>
